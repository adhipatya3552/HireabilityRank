# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  HireabilityRank introduces dual-axis candidate scoring: Skill Fit × Hireability.
  Most rankers only score on skill match; a technically perfect candidate who hasn't
  logged in for 3 months and has a 0% recruiter response rate is not actually
  hirable. Our system scores both dimensions separately and multiplies them.

  Pipeline: (1) Offline precompute.py encodes all 100K candidates with
  all-MiniLM-L6-v2 and builds a FAISS IndexFlatIP. (2) Runtime rank.py embeds
  the JD, retrieves top 5000 via FAISS cosine search, then reranks with five
  weighted components: semantic match (28%), skill overlap with trust multiplier
  (25%), years-of-experience fit (12%), product-vs-research career tilt (12%),
  and hireability score from 23 behavioral signals (18%). A 6-flag trap detector
  applies a 90% score penalty to honeypots and keyword stuffers.
  Runtime: under 2 minutes on 8-core CPU after precompute.

