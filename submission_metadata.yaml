ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, signal weighting, and trap detection written by the team.
  No candidate data was fed to any hosted LLM during ranking.

methodology_summary: |
  HireabilityRank uses a two-stage pipeline:
  Stage 1 (offline, precompute.py): Sentence-transformer embeddings (all-MiniLM-L6-v2)
  computed for all 100K candidates, stored in a FAISS IndexFlatIP for fast cosine search.
  Stage 2 (runtime <5 min, rank.py): JD is embedded, FAISS retrieves top 5000 candidates,
  then a multi-factor scoring model reranks them:
    - Semantic Match (28%): FAISS cosine similarity JD vs candidate text
    - Skill Match (25%): JD-required skills with trust multiplier to penalise keyword stuffers
    - Experience (12%): JD sweet spot 5-9 years
    - Career Signal (12%): product-engineering vs researcher tilt from career descriptions
    - Hireability (18%): 23 behavioral signals — open-to-work, response rate,
      interview completion, offer acceptance, notice period
    - Trap Penalty (90% reduction): 6-flag detector for honeypots and keyword stuffers
  This dual-axis approach (Fit × Hireability) is the core novelty: a perfect-on-paper
  candidate who is inactive and unresponsive ranks lower than a slightly weaker but
  genuinely available candidate. Runtime ~90 seconds on 8-core CPU.

